name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/ci-backend.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/ci-backend.yml"
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"  # Nightly at 03:00 UTC (for live-llm job)

jobs:
  pre-commit:
    name: Pre-commit hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
      - run: pip install pre-commit
      - run: pre-commit run --all-files

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libpango-1.0-0 libharfbuzz0b libpangoft2-1.0-0 libcairo2 libgdk-pixbuf2.0-0
      - name: Install dependencies
        run: pip install -e ".[dev]"
        working-directory: backend
      - name: Ruff lint
        run: ruff check scriptforge/
        working-directory: backend
      - name: Ruff format check
        run: ruff format --check scriptforge/
        working-directory: backend
      - name: Mypy type check
        run: mypy scriptforge/
        working-directory: backend

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: scriptforge
          POSTGRES_PASSWORD: scriptforge
          POSTGRES_DB: scriptforge_test
        ports:
          - "5432:5432"
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - "6379:6379"
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://scriptforge:scriptforge@localhost:5432/scriptforge_test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: ci-test-secret-not-for-production
      ENVIRONMENT: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libpango-1.0-0 libharfbuzz0b libpangoft2-1.0-0 libcairo2 libgdk-pixbuf2.0-0
      - name: Install dependencies
        run: pip install -e ".[dev]"
        working-directory: backend
      - name: Run tests with coverage
        run: pytest -m "not behavioral and not live_llm" --cov=scriptforge --cov-report=xml --cov-fail-under=80 -q
        working-directory: backend
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  behavioral:
    name: Behavioral Tests
    runs-on: ubuntu-latest
    needs: [test]
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: scriptforge
          POSTGRES_PASSWORD: scriptforge
          POSTGRES_DB: scriptforge_test
        ports:
          - "5432:5432"
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      neo4j:
        image: neo4j:5-community
        env:
          NEO4J_AUTH: neo4j/testpassword
          NEO4J_PLUGINS: '[]'
        ports:
          - "7687:7687"
          - "7474:7474"
        options: >-
          --health-cmd "cypher-shell -u neo4j -p testpassword 'RETURN 1'"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - "6379:6379"
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://scriptforge:scriptforge@localhost:5432/scriptforge_test
      REDIS_URL: redis://localhost:6379/0
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: testpassword
      JWT_SECRET_KEY: ci-test-secret-not-for-production
      ENVIRONMENT: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libpango-1.0-0 libharfbuzz0b libpangoft2-1.0-0 libcairo2 libgdk-pixbuf2.0-0
      - name: Install dependencies
        run: pip install -e ".[dev]"
        working-directory: backend
      - name: Run database migrations
        run: alembic upgrade head
        working-directory: backend
      - name: Run behavioral tests
        run: pytest -m behavioral --tb=short -q
        working-directory: backend

  live-llm:
    name: Live LLM Tests (Nightly)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: scriptforge
          POSTGRES_PASSWORD: scriptforge
          POSTGRES_DB: scriptforge_test
        ports:
          - "5432:5432"
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      neo4j:
        image: neo4j:5-community
        env:
          NEO4J_AUTH: neo4j/testpassword
          NEO4J_PLUGINS: '[]'
        ports:
          - "7687:7687"
          - "7474:7474"
        options: >-
          --health-cmd "cypher-shell -u neo4j -p testpassword 'RETURN 1'"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - "6379:6379"
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://scriptforge:scriptforge@localhost:5432/scriptforge_test
      REDIS_URL: redis://localhost:6379/0
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: testpassword
      JWT_SECRET_KEY: ci-test-secret-not-for-production
      ENVIRONMENT: test
      # BYOK API keys must be configured as repository secrets
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libpango-1.0-0 libharfbuzz0b libpangoft2-1.0-0 libcairo2 libgdk-pixbuf2.0-0
      - name: Install dependencies
        run: pip install -e ".[dev]"
        working-directory: backend
      - name: Run database migrations
        run: alembic upgrade head
        working-directory: backend
      - name: Run live LLM tests
        run: pytest -m live_llm --live-llm --tb=short -q
        working-directory: backend
