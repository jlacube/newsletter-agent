name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/ci-frontend.yml"
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/ci-frontend.yml"

jobs:
  lint:
    name: Lint, Type Check & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: ESLint
        run: npm run lint
        working-directory: frontend
      - name: TypeScript type check
        run: npm run type-check
        working-directory: frontend
      - name: Prettier format check
        run: npm run format:check
        working-directory: frontend

  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: Next.js production build
        run: npm run build
        working-directory: frontend
        env:
          NEXT_PUBLIC_BACKEND_URL: http://localhost:8000
          # NEXTAUTH_SECRET is required at runtime only, not at build time.
          # Provide a dummy value so the build does not fail on missing env var checks.
          NEXTAUTH_SECRET: ci-nextauth-secret-not-for-production
          NEXTAUTH_URL: http://localhost:3000
