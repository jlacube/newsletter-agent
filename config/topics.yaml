# =============================================================================
# Newsletter Agent - Topic Configuration
# =============================================================================
# This file defines the newsletter content, schedule, and delivery settings.
# See specs/newsletter-agent.spec.md Sections 7.1, 7.2, 8.4 for full schema.
# =============================================================================

# Newsletter metadata and delivery settings
newsletter:
  title: "Daily Agentic & GenAI Digest"            # Display title (1-200 chars)
  schedule: "0 6 * * *"                  # Cron: Sunday 8am UTC
  recipient_emails:                       # Delivery targets (1-10 emails)
    - "jerome.lacube@gmail.com"
    - "jerome.lacube@engie.com"

# Application settings
settings:
  dry_run: false                          # true = save HTML only, no email
  output_dir: "output/"                  # Where to save HTML output
  timeframe: "last_week"
  verify_links: true
  max_research_rounds: 5

# Research topics (1-20 items)
topics:
  # Topic with all options specified (deep research, both providers)
  - name: "Agentic Frameworks"
    query: >-
      Latest developments in AI agent frameworks, including LangChain,
      CrewAI, Google ADK, and AutoGen. Focus on new trendy frameworks, benchmarks,
      and adoption trends.
    search_depth: "deep"
    sources:
      - google_search
      #- perplexity

  - name: "Gen AI RAG"
    query: >-
      Latest developments in Gen AI RAG frameworks. Focus on new trendy frameworks, benchmarks,
      and adoption trends.
    search_depth: "deep"
    sources:
      - google_search
      #- perplexity

  - name: "GenAI Reasoning and Memory"
    query: >-
      Latest developments in Gen AI Reasoning and Memory technics inside LLMs. Focus on new trendy approachs, benchmarks,
      and adoption trends.
    search_depth: "deep"
    sources:
      - google_search
      #- perplexity

  - name: "Gen AI SLMs / MMLs"
    query: >-
      Latest developments in Gen AI Small Language Models and Medium Language Models. Focus on new trendy ones, benchmarks,
      and adoption trends.
    search_depth: "deep"
    sources:
      - google_search
      #- perplexity

  - name: "Gen AI Eval"
    query: >-
      Latest developments in Gen AI Evaluation frameworks. Focus on new trendy ones, benchmarks,
      and adoption trends.
    search_depth: "deep"
    sources:
      - google_search
      #- perplexity

  - name: "Gen AI Research"
    query: >-
      Latest research and academic work in Gen AI fields. Focus on publications and validations by peers / recognized performance improvements
    search_depth: "deep"
    sources:
      - google_search
      #- perplexity
